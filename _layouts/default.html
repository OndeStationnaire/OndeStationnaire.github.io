<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080808;
      --bg2:      #101010;
      --accent:   #9b7fa6;
      --accent2:  #c8a8c8;
      --text:     #d4ccd4;
      --text-dim: #7a6e7a;
      --border:   #2a222a;
      --nav-h:    64px;
      --mono:     'Share Tech Mono', monospace;
      --serif:    'Crimson Pro', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-size: 1.125rem;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── SCAN LINE ────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── NAV ──────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(8,8,8,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: .95rem;
      color: var(--accent2);
      letter-spacing: .15em;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: .1em;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--accent2); }

    /* Hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: .5rem;
      background: none;
      border: none;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--accent2);
      transition: transform .3s, opacity .3s;
    }

    /* Menu mobile ouvert */
    .nav-open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
    .nav-open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 640px) {
      .nav-toggle { display: flex; }

      .nav-links {
        position: fixed;
        top: var(--nav-h);
        left: 0; right: 0;
        flex-direction: column;
        gap: 0;
        background: rgba(8,8,8,.97);
        border-bottom: 1px solid var(--border);
        max-height: 0;
        overflow: hidden;
        transition: max-height .35s ease;
      }
      .nav-links li a {
        display: block;
        padding: 1rem 2rem;
        border-top: 1px solid var(--border);
        font-size: .9rem;
      }
      .nav-open .nav-links { max-height: 400px; }
    }

    /* ── SCROLL OFFSET pour ancres ────────────────────── */
    [id] { scroll-margin-top: calc(var(--nav-h) + 1.5rem); }

    /* ── CONTENU GÉNÉRIQUE ────────────────────────────── */
    .page-content {
      max-width: 800px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 3rem) 2rem 6rem;
    }

    .page-content h1 {
      font-family: var(--mono);
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--accent2);
      letter-spacing: .05em;
      margin-bottom: 1.5rem;
    }
    .page-content h2 {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: .15em;
      margin: 2.5rem 0 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-content p { margin-bottom: 1.2rem; }
    .page-content a { color: var(--accent2); }
    .page-content strong { color: var(--accent2); }
    .page-content em { font-style: italic; color: var(--text); }

    .page-content table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: .85rem;
      margin-bottom: 2rem;
    }
    .page-content th {
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding: .5rem 1rem;
      text-align: left;
      letter-spacing: .1em;
    }
    .page-content td {
      padding: .5rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .page-content tr:hover td { background: var(--bg2); }

    /* ── FOOTER ───────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text-dim);
      letter-spacing: .1em;
    }
  </style>
  {% if page.extra_css %}{{ page.extra_css }}{% endif %}
</head>
<body>

  <nav id="main-nav">
    <a class="nav-logo" href="/">RU5T_DRIFT</a>

    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="nav-links">
      {{ site.nav_links }}
      <li><a href="/">Accueil</a></li>
      <li><a href="/episodes">Épisodes</a></li>
      <li><a href="/presse">Dossier de presse</a></li>
    </ul>
  </nav>

  {{ content }}

  <footer>
    {{ site.title }} &nbsp;·&nbsp; Les Codes du Royaume &nbsp;·&nbsp;
    &copy; OndeStationnaire {{ site.time | date: "%Y" }}
  </footer>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav    = document.getElementById('main-nav');
    const links  = document.querySelectorAll('#nav-links a');

    toggle.addEventListener('click', () => nav.classList.toggle('nav-open'));
    links.forEach(l => l.addEventListener('click', () => nav.classList.remove('nav-open')));
  </script>

</body>
</html>
