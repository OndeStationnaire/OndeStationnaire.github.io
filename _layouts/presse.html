---
layout: default
---
<style>
  /* ── DIAPORAMA ──────────────────────────────────── */
  .slideshow {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100vh - var(--nav-h));
    overflow: hidden;
    background: #000;
    margin-top: var(--nav-h);
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity .9s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide.active { opacity: 1; }
  .slide img { width: 100%; height: 100%; object-fit: contain; }

  .slide-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    z-index: 10;
    background: rgba(8,8,8,.55);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 1.4rem;
    width: 3rem; height: 3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s;
  }
  .slide-btn:hover { background: rgba(155,127,166,.2); border-color: var(--accent); }
  .slide-btn.prev { left: 1.2rem; }
  .slide-btn.next { right: 1.2rem; }

  .slide-dots {
    position: absolute;
    bottom: 1rem; left: 50%; transform: translateX(-50%);
    display: flex; gap: .6rem; z-index: 10;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    border: none;
    cursor: pointer;
    transition: background .2s, transform .2s;
  }
  .dot.active { background: var(--accent2); transform: scale(1.35); }

  .slide-hint {
    position: absolute;
    bottom: 1rem; right: 1.5rem;
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--text-dim);
    z-index: 10;
  }

  /* Pause au survol */
  .slideshow:hover .slide-hint::after { content: ' [pause]'; }

  /* ── DOSSIER ────────────────────────────────────── */
  .press-kit {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  .divider {
    display: flex; align-items: center; gap: 1.5rem;
    padding: 3rem 0 0;
    margin-bottom: 0;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-label {
    font-family: var(--mono); font-size: .72rem;
    color: var(--text-dim); letter-spacing: .2em; white-space: nowrap;
  }

  .press-header {
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2.5rem;
  }
  .press-tag {
    font-family: var(--mono); font-size: .72rem;
    color: var(--accent); letter-spacing: .2em; margin-bottom: .6rem;
  }
  .press-title {
    font-family: var(--mono);
    font-size: clamp(2.2rem, 5vw, 4rem);
    color: var(--accent2); letter-spacing: .05em; line-height: 1;
    margin-bottom: .8rem;
  }
  .press-subtitle {
    font-style: italic; font-size: 1.2rem; color: var(--text-dim);
  }

  .section-label {
    font-family: var(--mono); font-size: .72rem;
    color: var(--accent); letter-spacing: .2em;
    margin-bottom: 1rem; padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }

  .pitch-hook {
    font-size: 1.3rem; font-style: italic; color: var(--accent2);
    border-left: 3px solid var(--accent);
    padding-left: 1.5rem; margin-bottom: 1.8rem; line-height: 1.5;
  }

  .two-col {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 3rem; margin: 2.5rem 0;
  }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }

  .press-image { width: 100%; border: 1px solid var(--border); display: block; margin-bottom: .6rem; }
  .press-image-caption { font-family: var(--mono); font-size: .7rem; color: var(--text-dim); letter-spacing: .1em; }

  .char-list { list-style: none; display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 1.5rem; }
  .char-list li { padding-left: 1rem; border-left: 2px solid var(--border); }
  .char-name { font-family: var(--mono); font-size: .88rem; color: var(--accent2); margin-bottom: .2rem; }

  .tags { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1rem; }
  .tag {
    font-family: var(--mono); font-size: .7rem;
    color: var(--accent); border: 1px solid var(--border);
    padding: .25rem .7rem; letter-spacing: .1em;
  }

  .specs { display: grid; grid-template-columns: auto 1fr; gap: .5rem 1.5rem; }
  .specs dt { font-family: var(--mono); font-size: .8rem; color: var(--text-dim); white-space: nowrap; }

  .contact-block {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 1.5rem 2rem; font-family: var(--mono);
    font-size: .85rem; color: var(--text-dim); line-height: 2;
  }
  .contact-block a { color: var(--accent2); text-decoration: none; }
  .contact-block a:hover { text-decoration: underline; }

  .press-section { margin-bottom: 3rem; }
</style>

<!-- DIAPORAMA -->
<section class="slideshow" id="slideshow" aria-label="Diaporama de présentation">
  {% for slide in page.slides %}
  <div class="slide{% if forloop.first %} active{% endif %}">
    <img src="{{ slide.src }}" alt="{{ slide.alt }}">
  </div>
  {% endfor %}

  <button class="slide-btn prev" id="prev" aria-label="Précédent">&#8592;</button>
  <button class="slide-btn next" id="next" aria-label="Suivant">&#8594;</button>
  <div class="slide-dots" id="dots"></div>
  <div class="slide-hint" id="hint">1 / {{ page.slides | size }}</div>
</section>

<!-- CONTENU MARKDOWN INJECTÉ ICI -->
<main class="press-kit">
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">// DOSSIER DE PRESSE</span>
    <div class="divider-line"></div>
  </div>

  {{ content }}
</main>

<script>
  const slides = document.querySelectorAll('.slide');
  const dotsEl = document.getElementById('dots');
  const hint   = document.getElementById('hint');
  let cur = 0, timer, paused = false;

  slides.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'dot' + (i === 0 ? ' active' : '');
    b.setAttribute('aria-label', `Slide ${i+1}`);
    b.onclick = () => goTo(i);
    dotsEl.appendChild(b);
  });

  function goTo(n) {
    slides[cur].classList.remove('active');
    dotsEl.children[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active');
    dotsEl.children[cur].classList.add('active');
    hint.textContent = `${cur + 1} / ${slides.length}`;
  }

  document.getElementById('prev').onclick = () => { goTo(cur - 1); resetTimer(); };
  document.getElementById('next').onclick = () => { goTo(cur + 1); resetTimer(); };

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { goTo(cur - 1); resetTimer(); }
    if (e.key === 'ArrowRight') { goTo(cur + 1); resetTimer(); }
  });

  // Pause au survol
  document.getElementById('slideshow').addEventListener('mouseenter', () => {
    paused = true; clearInterval(timer);
  });
  document.getElementById('slideshow').addEventListener('mouseleave', () => {
    paused = false; resetTimer();
  });

  function resetTimer() {
    clearInterval(timer);
    if (!paused) timer = setInterval(() => goTo(cur + 1), 8000);
  }

  resetTimer();
</script>
