<style>
    :root {
        --bg-color: #050505;
        --ui-text: #ffffff;
        --ui-border: #333;
        --highlight-interact: rgba(255, 255, 0, 0.35);
        --highlight-nav: rgba(0, 200, 255, 0.25);
        --frame-w: 1280px;
        --frame-h: 720px;
    }

    * { box-sizing: border-box; }

    body {
        background-color: var(--bg-color);
        color: var(--ui-text);
        margin: 0;
        padding: 0;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        cursor: default;
    }

    /* ---------- HEADER ---------- */
    #ui-header {
        width: var(--frame-w);
        max-width: 100vw;
        background-color: #000;
        border: 2px solid var(--ui-border);
        border-bottom: none;
        padding: 12px 0;
        text-align: center;
    }

    #location-name {
        margin: 0;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--ui-text);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    /* ---------- CADRE DE JEU ---------- */
    #game-container {
        position: relative;
        width: var(--frame-w);
        height: var(--frame-h);
        max-width: 100vw;
        aspect-ratio: 16 / 9;
        max-height: calc(100vh - 80px);
        background-color: #000;
        border: 2px solid var(--ui-border);
        overflow: hidden;
    }

    #scene-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
    }

    #hotspots-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }

    /* ---------- HOTSPOTS ---------- */
    .hotspot {
        position: absolute;
        cursor: pointer;
        pointer-events: auto;
        border: 1px solid transparent;
        transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .hotspot.interact:hover {
        background-color: var(--highlight-interact);
        border-color: rgba(255, 255, 200, 0.9);
        box-shadow: inset 0 0 12px rgba(255, 255, 200, 0.4);
    }

    .hotspot.nav:hover {
        background-color: var(--highlight-nav);
        border-color: rgba(0, 220, 255, 0.7);
    }

    .hotspot[data-label]:hover::after {
        content: attr(data-label);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 3px 8px;
        font-size: 12px;
        white-space: nowrap;
        border: 1px solid #555;
        margin-bottom: 4px;
        pointer-events: none;
    }

    /* ---------- MODAL JOURNAL ---------- */
    #journal-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 200;
        justify-content: center;
        align-items: center;
    }

    #journal-modal.open { display: flex; }

    .journal-window {
        width: 650px;
        max-width: 90vw;
        height: 720px;
        max-height: 85vh;
        background-color: #1a1a1a;
        border: 3px solid #444;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
    }

    .journal-header,
    .doc-header {
        padding: 15px;
        background-color: #222;
        border-bottom: 2px solid #444;
        text-align: center;
        position: relative;
    }

    .journal-header h2,
    .doc-header h2 {
        margin: 0;
        font-size: 1.2rem;
        letter-spacing: 2px;
        color: #fff;
    }

    .journal-header small,
    .doc-header small { color: #888; }

    .journal-close,
    .doc-close {
        position: absolute;
        top: 10px;
        right: 12px;
        background: transparent;
        border: 1px solid #555;
        color: #ccc;
        width: 28px;
        height: 28px;
        line-height: 1;
        cursor: pointer;
        font-family: inherit;
    }
    .journal-close:hover,
    .doc-close:hover { background: #444; color: #fff; }

    .journal-content {
        flex-grow: 1;
        padding: 25px;
        overflow-y: auto;
        color: #ddd;
        line-height: 1.6;
        background-color: #252525;
        display: flex;
        align-items: flex-start;
        justify-content: center;
    }

    .journal-content .text-page {
        width: 100%;
        white-space: pre-wrap;
    }

    .journal-content img {
        max-width: 100%;
        max-height: 100%;
        border: 1px solid #555;
        display: block;
    }

    .journal-footer {
        padding: 12px 15px;
        background-color: #222;
        border-top: 2px solid #444;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .journal-footer button {
        background: #333;
        color: #fff;
        border: 1px solid #666;
        padding: 8px 14px;
        cursor: pointer;
        font-family: inherit;
    }
    .journal-footer button:hover { background-color: #444; }
    .journal-footer button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    #page-indicator { color: #aaa; font-size: 13px; }

    /* ---------- MODAL DOCUMENT ---------- */
    #doc-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 200;
        justify-content: center;
        align-items: center;
    }
    #doc-modal.open { display: flex; }

    .doc-window {
        width: 720px;
        max-width: 92vw;
        height: 820px;
        max-height: 90vh;
        background-color: #1c1c1c;
        border: 3px solid #444;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.95);
        display: flex;
        flex-direction: column;
    }

    .doc-content {
        flex-grow: 1;
        padding: 40px 50px;
        overflow-y: auto;
        line-height: 1.7;
        background-color: #f4f1e8;
        color: #1a1a1a;
        font-family: Georgia, 'Times New Roman', serif;
    }

    /* Variantes de style */
    .doc-window.style-handwritten .doc-content {
        background-color: #f0ead6;
        font-family: 'Bradley Hand', 'Comic Sans MS', cursive;
        font-size: 17px;
        color: #1a2440;
    }

    .doc-window.style-typed .doc-content {
        background-color: #f4f1e8;
        font-family: 'Courier New', Courier, monospace;
        font-size: 17px;
        color: #1a1a1a;
    }

    .doc-window.style-screen .doc-content {
        background-color: #0a0a0a;
        color: #4dff4d;
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        text-shadow: 0 0 3px rgba(77, 255, 77, 0.4);
    }

    /* Préservation des espaces pour les styles monospace */
    .doc-window.style-typed .doc-content p,
    .doc-window.style-screen .doc-content p {
    white-space: pre-wrap;
    }

    .doc-content figure {
    margin: 1.2em 0;
    text-align: center;
}

    .doc-content img {
        max-width: 100%;
        height: auto;
        border: 1px solid rgba(0, 0, 0, 0.2);
        display: inline-block;
    }

    /* Pour le style screen : bordure verte phosphore */
    .doc-window.style-screen .doc-content img {
        border-color: rgba(77, 255, 77, 0.4);
        box-shadow: 0 0 8px rgba(77, 255, 77, 0.2);
    }


    /* Markdown rendu */
    .doc-content h1 {
        font-size: 1.6em;
        margin: 0 0 0.5em 0;
        text-align: center;
        font-weight: bold;
    }
    .doc-content h2 {
        font-size: 1.3em;
        margin: 1.2em 0 0.4em 0;
        font-weight: bold;
    }
    .doc-content h3 {
        font-size: 1.1em;
        margin: 1em 0 0.3em 0;
        font-weight: bold;
    }
    .doc-content p {
        margin: 0 0 0.9em 0;
    }
    .doc-content ul {
        margin: 0.5em 0 1em 0;
        padding-left: 1.5em;
    }
    .doc-content li {
        margin-bottom: 0.4em;
    }
    .doc-content blockquote {
        border-left: 3px solid #888;
        margin: 1em 0;
        padding: 0.3em 1em;
        font-style: italic;
        opacity: 0.85;
    }
    .doc-content hr {
        border: none;
        border-top: 1px dashed #999;
        margin: 1.5em 0;

// Crée un carré visuel centré ou positionné, exprimé en % de hauteur.
// size = taille du carré en % de la hauteur de l'image (ex: 15 pour un carré de 15%)
// cx, cy = centre du carré en % (50, 50 = centre de l'image)
function square(size, cx = 50, cy = 60) {
    const aspectRatio = 16 / 9;
    const w = size / aspectRatio;  // largeur en % corrigée pour le 16:9
    const h = size;
    return {
        x: cx - w / 2,
        y: cy - h / 2,
        w: w,
        h: h
    };
}

# Rules to running the Houses

![GenAI — les trois silhouettes en combinaison](./images/carole_hazmat_01.jpg)

People ask me why I go into the ruined houses. They see the warning signs at the entrance to the Coast — the skull symbols, the faded letters spelling "VX CONTAMINATION ZONE" — and they think I'm crazy or suicidal.

But I'm not. **I have rules.**

## The Rules

### 1. Always Enter Through the Front Door

Never through a window. Never by breaking in. What remains of the spirits of the dead don't like it when you disrespect their threshold. You knock first (even if nobody's home), you announce yourself, and you enter properly.

Some people think this is superstition. Maybe it is. But I've never had problems in houses where I followed this rule.

### 2. Read the Mold

This is the most important rule. Mold tells you everything you need to know about a house:

- **No mold at all?** The house is contaminated. Leave immediately. VX prevents biological growth.
- **Black mold?** Gaia has claimed this house. It belongs to Her now. Abandon it. She doesn't share.

Once inside, I go to the living room. Most houses still have their Modules — servants for the home. They're usually dormant, but if the photoconverters still work, I can reboot them.

This is absolute. Pools, basements with flooding, toilets that haven't been flushed in eighty years — all potential VX traps. The gas bonds to water. It waits.

### 5. Avoid the Basement

Unless it's completely dry and well-ventilated, I don't go down. Too risky. Too dark. And honestly, most of what's valuable has already been looted anyway.

const Game = {
    currentSceneId: null,

    load(sceneId) {
        const scene = LOCATIONS[sceneId];
        if (!scene) {
            console.error(`[Game] Lieu inconnu : "${sceneId}"`);
            return;
        }
        this.currentSceneId = sceneId;

        document.getElementById('location-name').textContent = scene.name;

        const img = document.getElementById('scene-image');
        img.onerror = () => {
            img.onerror = null;
            img.alt = `[Image manquante : ${scene.image}]`;
            img.removeAttribute('src');
        };
        img.alt = scene.name;
        img.src = scene.image || '';

        this.renderZones(scene.zones || []);
    },

    renderZones(zones) {
        const layer = document.getElementById('hotspots-layer');
        layer.innerHTML = '';

        zones.forEach(z => {
            const el = document.createElement('div');
            el.className = 'hotspot ' + (z.type === 'nav' ? 'nav' : 'interact');
            el.style.left   = z.x + '%';
            el.style.top    = z.y + '%';
            el.style.width  = z.w + '%';
            el.style.height = z.h + '%';
            if (z.label) el.dataset.label = z.label;

            el.addEventListener('click', (e) => {
                e.stopPropagation();
                this.handleAction(z.action);
            });

            layer.appendChild(el);
        });
    },

    handleAction(action) {
        if (!action) return;
        if (action.goto) {
            this.load(action.goto);
        } else if (action.openJournal) {
            Journal.open(action.openJournal);
        } else if (action.showDoc) {
            Document_.open(action.showDoc);
        }
    }
};

/* =====================================================================
   JOURNAL — multi-instances par ID
===================================================================== */
const Journal = {
    currentId: null,
    index: 0,

    open(journalId) {
        const journal = JOURNALS[journalId];
        if (!journal) {
            console.error(`[Journal] ID inconnu : "${journalId}"`);
            return;
        }

        // Si on rouvre le même journal, on reprend où on était.
        // Si c'est un journal différent, on repart à la première page.
        if (this.currentId !== journalId) {
            this.currentId = journalId;
            this.index = 0;
        }

        document.getElementById('journal-title').textContent = journal.title || 'JOURNAL';
        document.getElementById('journal-byline').textContent = journal.byline || '';

        document.getElementById('journal-modal').classList.add('open');
        this.render();
    },

    close() {
        document.getElementById('journal-modal').classList.remove('open');
    },

    _pages() {
        if (!this.currentId) return [];
        return (JOURNALS[this.currentId] || {}).pages || [];
    },

    next() {
        const pages = this._pages();
        if (this.index < pages.length - 1) {
            this.index++;
            this.render();
        }
    },

    prev() {
        if (this.index > 0) {
            this.index--;
            this.render();
        }
    },

    render() {
        const container = document.getElementById('journal-content');
        const indicator = document.getElementById('page-indicator');
        const btnPrev = document.getElementById('journal-prev');
        const btnNext = document.getElementById('journal-next');

        container.innerHTML = '';
        const pages = this._pages();
        const page = pages[this.index];
        if (!page) return;

        if (page.type === 'text') {
            const div = document.createElement('div');
            div.className = 'text-page';
            div.textContent = page.content;
            container.appendChild(div);
        } else if (page.type === 'image') {
            const wrap = document.createElement('div');
            const img = document.createElement('img');
            img.src = page.src;
            img.alt = page.caption || 'Page illustrée';
            img.onerror = () => {
                img.style.display = 'none';
                const fb = document.createElement('p');
                fb.style.color = '#888';
                fb.textContent = `[Image manquante : ${page.src}]`;
                wrap.appendChild(fb);
            };
            wrap.appendChild(img);
            if (page.caption) {
                const cap = document.createElement('p');
                cap.style.cssText = 'color:#888;font-size:12px;text-align:center;margin-top:8px;';
                cap.textContent = page.caption;
                wrap.appendChild(cap);
            }
            container.appendChild(wrap);
        }

        indicator.textContent = `${this.index + 1} / ${pages.length}`;
        btnPrev.disabled = (this.index === 0);
        btnNext.disabled = (this.index === pages.length - 1);
    }
};

const Document_ = {
    open(docId) {
        const doc = DOCUMENTS[docId];
        if (!doc) {
            console.error(`[Document] ID inconnu : "${docId}"`);
            return;
        }

        document.getElementById('doc-title').textContent = doc.title || '';
        document.getElementById('doc-byline').textContent = doc.byline || '';

        const win = document.getElementById('doc-window');
        win.className = 'doc-window';
        if (doc.style) win.classList.add('style-' + doc.style);

        const content = document.getElementById('doc-content');
        content.innerHTML = renderMarkdown(doc.content || '');
        content.scrollTop = 0;

        document.getElementById('doc-modal').classList.add('open');
    },

    close() {
        document.getElementById('doc-modal').classList.remove('open');
    }
};

===================================================================== */
function renderMarkdown(md) {
    let text = md.trim();

    // Séparateurs ---
    text = text.replace(/^---+$/gm, '<hr>');

    // Images : ![alt](url) — traitées tôt pour être détectées comme blocs
        text = text.replace(/^!\[([^\]]*)\]\(([^)]+)\)$/gm, '<figure><img src="$2" alt="$1"></figure>');

    // Images inline dans un paragraphe
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

    // Titres
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Gras AVANT italique
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italique
    text = text.replace(/(^|[^\*])\*([^\*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');

    // Citations
    text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    text = text.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

    // Listes
    text = text.replace(/(?:^- .+\n?)+/gm, function (block) {
        const items = block.trim().split('\n').map(line =>
            '<li>' + line.replace(/^- /, '') + '</li>'
        ).join('');
        return '<ul>' + items + '</ul>\n';
    });

    // Paragraphes
    const blocks = text.split(/\n{2,}/);
    text = blocks.map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-6]|ul|ol|li|blockquote|hr|p)/.test(block)) return block;
        if (/^<(h[1-6]|ul|ol|li|blockquote|hr|p|figure)/.test(block)) return block;
        return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');

    return text;
}

/* =====================================================================
   RACCOURCIS CLAVIER
===================================================================== */
document.addEventListener('keydown', (e) => {
    const journalOpen = document.getElementById('journal-modal').classList.contains('open');
    const docOpen = document.getElementById('doc-modal').classList.contains('open');

    if (docOpen) {
        if (e.key === 'Escape') Document_.close();
        return;
    }
    if (journalOpen) {
        if (e.key === 'Escape') Journal.close();
        else if (e.key === 'ArrowRight') Journal.next();
        else if (e.key === 'ArrowLeft')  Journal.prev();
    }
});

document.getElementById('journal-modal').addEventListener('click', (e) => {
    if (e.target.id === 'journal-modal') Journal.close();
});
document.getElementById('doc-modal').addEventListener('click', (e) => {
    if (e.target.id === 'doc-modal') Document_.close();
});
