<style>
    :root {
        --bg-color: #050505;
        --ui-text: #ffffff;
        --ui-border: #333;
        --highlight-interact: rgba(255, 255, 0, 0.35);
        --highlight-nav: rgba(0, 200, 255, 0.25);
        --frame-w: 1280px;
        --frame-h: 720px;
    }

    * { box-sizing: border-box; }

    body {
        background-color: var(--bg-color);
        color: var(--ui-text);
        margin: 0;
        padding: 0;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        cursor: default;
    }

    /* ---------- HEADER ---------- */
    #ui-header {
        width: var(--frame-w);
        max-width: 100vw;
        background-color: #000;
        border: 2px solid var(--ui-border);
        border-bottom: none;
        padding: 12px 0;
        text-align: center;
    }

    #location-name {
        margin: 0;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--ui-text);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    /* ---------- CADRE DE JEU ---------- */
    #game-container {
        position: relative;
        width: var(--frame-w);
        height: var(--frame-h);
        max-width: 100vw;
        aspect-ratio: 16 / 9;
        max-height: calc(100vh - 80px);
        background-color: #000;
        border: 2px solid var(--ui-border);
        overflow: hidden;
    }

    #scene-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
    }

    #hotspots-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }

    /* ---------- HOTSPOTS ---------- */
    .hotspot {
        position: absolute;
        cursor: pointer;
        pointer-events: auto;
        border: 1px solid transparent;
        transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .hotspot.interact:hover {/*
        background-color: var(--highlight-interact);
        border-color: rgba(255, 255, 200, 0.9);
        box-shadow: inset 0 0 12px rgba(255, 255, 200, 0.4);*/
    }

    .hotspot.nav:hover {
        background-color: var(--highlight-nav);
        border-color: rgba(0, 220, 255, 0.7);
    }

    .hotspot[data-label]:hover::after {
        content: attr(data-label);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 3px 8px;
        font-size: 12px;
        white-space: nowrap;
        border: 1px solid #555;
        margin-bottom: 4px;
        pointer-events: none;
    }

    /* ---------- MODAL JOURNAL ---------- */
    /* ---------- MODAL JOURNAL / LIVRE ---------- */
    #journal-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        z-index: 200;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    #journal-modal.open { display: flex; }

    /* --- Conteneur du livre --- */
    .book-container {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-grow: 1;
        width: 92vw;
        max-height: 82vh;
        padding: 20px;
    }

    /* --- Couverture (page 0) : image unique centrée --- */
    .book-cover {
        max-width: 45vw;
        max-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .book-cover img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        display: block;
        box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.6);
    }

    /* --- Double page (spreads) --- */
    .book-spread {
        display: flex;
        height: 80vh;            /* hauteur fixe */
        aspect-ratio: 4 / 3;     /* la largeur se déduit */
        max-width: 92vw;          /* sécurité écrans étroits */
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        flex-shrink: 0;
    }

    .book-page {
        flex: 1;
        aspect-ratio: 2 / 3;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    /* Page gauche : bord droit = reliure */
    .book-page.left {
        border-right: 1px solid rgba(0, 0, 0, 0.3);
    }

    /* Contenu texte dans une page */
    .book-page-text {
        width: 100%;
        height: 100%;
        padding: 8%;
        overflow-y: auto;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: clamp(11px, 1.4vw, 16px);
        line-height: 1.6;
        color: #1a1a1a;
        box-sizing: border-box;
    }

    /* Contenu image dans une page */
    .book-page-image {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5%;
        box-sizing: border-box;
    }

    .book-page-image img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
    }

    /* Page vide */
    .book-page-blank {
        width: 100%;
        height: 100%;
    }

    /* Couleurs de fond par défaut (papier crème) */
    .book-spread .book-page {
        background-color: #f4f0e6;
    }

    .book-spread.style-cream .book-page { background-color: #f4f0e6; }
    .book-spread.style-pink .book-page { background-color: #f0dcd8; }
    .book-spread.style-white .book-page { background-color: #f8f8f8; }

/* Variantes de police — appliquées via .book-spread.font-xxx */

// Crée un carré visuel centré ou positionné, exprimé en % de hauteur.
// size = taille du carré en % de la hauteur de l'image (ex: 15 pour un carré de 15%)
// cx, cy = centre du carré en % (50, 50 = centre de l'image)
function square(size, cx = 50, cy = 60) {
    const aspectRatio = 16 / 9;
    const w = size / aspectRatio;  // largeur en % corrigée pour le 16:9
    const h = size;
    return {
        x: cx - w / 2,
        y: cy - h / 2,
        w: w,
        h: h
    };
}

const Game = {
    currentSceneId: null,

    load(sceneId) {
        const scene = LOCATIONS[sceneId];
        if (!scene) {
            console.error(`[Game] Lieu inconnu : "${sceneId}"`);
            return;
        }
        this.currentSceneId = sceneId;

        document.getElementById('location-name').textContent = scene.name;

        const img = document.getElementById('scene-image');
        img.onerror = () => {
            img.onerror = null;
            img.alt = `[Image manquante : ${scene.image}]`;
            img.removeAttribute('src');
        };
        img.alt = scene.name;
        img.src = scene.image || '';

        this.renderZones(scene.zones || []);
    },

    renderZones(zones) {
        const layer = document.getElementById('hotspots-layer');
        layer.innerHTML = '';

        zones.forEach(z => {
            const el = document.createElement('div');
            el.className = 'hotspot ' + (z.type === 'nav' ? 'nav' : 'interact');
            el.style.left   = z.x + '%';
            el.style.top    = z.y + '%';
            el.style.width  = z.w + '%';
            el.style.height = z.h + '%';
            if (z.label) el.dataset.label = z.label;

            el.addEventListener('click', (e) => {
                e.stopPropagation();
                this.handleAction(z.action);
            });

            layer.appendChild(el);
        });
    },

    handleAction(action) {
        if (!action) return;
        if (action.goto) {
            this.load(action.goto);
        } else if (action.openJournal) {
            Journal.open(action.openJournal);
        } else if (action.showDoc) {
            Document_.open(action.showDoc);
        } else if (action.showPic) {
            Picture.open(action.showPic);
        }
    }
};

/* =====================================================================
   JOURNAL / LIVRE — double page avec couverture
   ---------------------------------------------------------------------
   Structure des données dans JOURNALS :
   {
       title: "...",
       cover: "./images/couverture.jpg",  // optionnel
       pageStyle: "cream",                // optionnel : cream|blue|pink|white|lined
       spreads: [
           {
               left:  { type: 'image', src: '...', caption: '...' },
               right: { type: 'text', content: '...' }
           },
           {
               left:  { type: 'text', content: '...' },
               right: null   // page vide
           },
           ...
       ]
   }
   
   index 0 = couverture (si cover existe, sinon premier spread)
   index 1..N = spreads
===================================================================== */
const Journal = {
    currentId: null,
    index: 0,

    open(journalId) {
        const journal = JOURNALS[journalId];
        if (!journal) {
            console.error(`[Journal] ID inconnu : "${journalId}"`);
            return;
        }

        if (this.currentId !== journalId) {
            this.currentId = journalId;
            this.index = 0;
        }

        document.getElementById('journal-modal').classList.add('open');
        this.render();
    },

    close() {
        document.getElementById('journal-modal').classList.remove('open');
    },

    _journal() {
        return JOURNALS[this.currentId] || null;
    },

    _hasCover() {
        const j = this._journal();
        return j && j.cover;
    },

    _maxIndex() {
        const j = this._journal();
        if (!j) return 0;
        const spreadCount = (j.spreads || []).length;
        return (this._hasCover() ? 1 : 0) + spreadCount - 1;
    },

    next() {
        if (this.index < this._maxIndex()) {
            this.index++;
            this.render();
        }
    },

    prev() {
        if (this.index > 0) {
            this.index--;
            this.render();
        }
    },

    render() {
        const container = document.getElementById('book-container');
        const indicator = document.getElementById('book-indicator');
        const btnPrev = document.getElementById('book-prev');
        const btnNext = document.getElementById('book-next');

        container.innerHTML = '';
        const j = this._journal();
        if (!j) return;

        const hasCover = this._hasCover();

        if (hasCover && this.index === 0) {
            // --- COUVERTURE ---
            const coverDiv = document.createElement('div');
            coverDiv.className = 'book-cover';
            const img = document.createElement('img');
            img.src = j.cover;
            img.alt = j.title || 'Couverture';
            img.onerror = () => { img.alt = '[Couverture manquante]'; };
            coverDiv.appendChild(img);
            container.appendChild(coverDiv);
            indicator.textContent = 'Couverture';
        } else {
            // --- DOUBLE PAGE ---
            const spreadIndex = hasCover ? this.index - 1 : this.index;
            const spread = (j.spreads || [])[spreadIndex];
            if (!spread) return;

            const spreadDiv = document.createElement('div');
            spreadDiv.className = 'book-spread';
            if (j.pageStyle) spreadDiv.classList.add('style-' + j.pageStyle);
            if (j.font) spreadDiv.classList.add('font-' + j.font);

            spreadDiv.appendChild(this._renderPage(spread.left, 'left'));
            spreadDiv.appendChild(this._renderPage(spread.right, 'right'));

            container.appendChild(spreadDiv);
            
            const totalSpreads = (j.spreads || []).length;
            indicator.textContent = `${spreadIndex + 1} / ${totalSpreads}`;
        }

        btnPrev.disabled = (this.index === 0);
        btnNext.disabled = (this.index >= this._maxIndex());
    },

    _renderPage(pageData, side) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'book-page ' + side;

        if (!pageData || pageData.type === 'blank') {
            // Page vide
            const blank = document.createElement('div');
            blank.className = 'book-page-blank';
            pageDiv.appendChild(blank);
        } else if (pageData.type === 'text') {
            const textDiv = document.createElement('div');
            textDiv.className = 'book-page-text';
            textDiv.innerHTML = renderMarkdown(pageData.content || '');
            pageDiv.appendChild(textDiv);
        } else if (pageData.type === 'image') {
            const imgWrap = document.createElement('div');
            imgWrap.className = 'book-page-image';
            const img = document.createElement('img');
            img.src = pageData.src || '';
            img.alt = pageData.caption || '';
            img.onerror = () => {
                img.style.display = 'none';
                const fb = document.createElement('p');
                fb.style.cssText = 'color:#888;font-size:12px;text-align:center;';
                fb.textContent = `[Image manquante : ${pageData.src}]`;
                imgWrap.appendChild(fb);
            };
            imgWrap.appendChild(img);
            if (pageData.caption) {
                const cap = document.createElement('p');
                cap.style.cssText = 'color:#555;font-size:10px;text-align:center;margin-top:6px;';
                cap.textContent = pageData.caption;
                imgWrap.appendChild(cap);
            }
            pageDiv.appendChild(imgWrap);
        }

        return pageDiv;
    }
};

            return;
        }

        document.getElementById('pic-title').textContent = pic.title || '';

        const bylineEl = document.getElementById('pic-byline');
        if (Array.isArray(pic.byline)) {
            bylineEl.textContent = pic.byline.join('\n');
        } else {
            bylineEl.textContent = pic.byline || '';
        }

        const img = document.getElementById('pic-image');
        img.onerror = () => {
            img.alt = `[Image manquante : ${pic.src}]`;
        };
        img.alt = pic.title || '';
        img.src = pic.src || '';

        document.getElementById('pic-modal').classList.add('open');
    },

    close() {
        document.getElementById('pic-modal').classList.remove('open');
    }
};

/* =====================================================================
   PARSEUR MARKDOWN MINIMAL
===================================================================== */
function renderMarkdown(md) {
    let text = md.trim();

    // Séparateurs ---
    text = text.replace(/^---+$/gm, '<hr>');

    // Images : ![alt](url) — traitées tôt pour être détectées comme blocs
        text = text.replace(/^!\[([^\]]*)\]\(([^)]+)\)$/gm, '<figure><img src="$2" alt="$1"></figure>');

    // Images inline dans un paragraphe
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

    // Titres
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Gras AVANT italique
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italique
    text = text.replace(/(^|[^\*])\*([^\*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');

    // Citations
    text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    text = text.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

    // Listes
    text = text.replace(/(?:^- .+\n?)+/gm, function (block) {
        const items = block.trim().split('\n').map(line =>
            '<li>' + line.replace(/^- /, '') + '</li>'
        ).join('');
        return '<ul>' + items + '</ul>\n';
    });

    // Paragraphes
    const blocks = text.split(/\n{2,}/);
    text = blocks.map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-6]|ul|ol|li|blockquote|hr|p)/.test(block)) return block;
        if (/^<(h[1-6]|ul|ol|li|blockquote|hr|p|figure)/.test(block)) return block;
        return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');

    return text;
}

/* =====================================================================
   RACCOURCIS CLAVIER
===================================================================== */
document.addEventListener('keydown', (e) => {
    const journalOpen = document.getElementById('journal-modal').classList.contains('open');
    const docOpen = document.getElementById('doc-modal').classList.contains('open');
    const picOpen = document.getElementById('pic-modal').classList.contains('open');

    if (picOpen) {
        if (e.key === 'Escape') Picture.close();
        return;
    }
    if (docOpen) {
        if (e.key === 'Escape') Document_.close();
        return;
    }
    if (journalOpen) {
        if (e.key === 'Escape') Journal.close();
        else if (e.key === 'ArrowRight') Journal.next();
        else if (e.key === 'ArrowLeft')  Journal.prev();
    }
});

document.getElementById('journal-modal').addEventListener('click', (e) => {
    if (e.target.id === 'journal-modal') Journal.close();
});
document.getElementById('doc-modal').addEventListener('click', (e) => {
    if (e.target.id === 'doc-modal') Document_.close();
});
document.getElementById('pic-modal').addEventListener('click', (e) => {
    // Tout clic sur le modal ferme, sauf sur le bouton de fermeture
    // (qui a son propre handler onclick).
    if (e.target.tagName !== 'BUTTON') {
        Picture.close();
    }
});
