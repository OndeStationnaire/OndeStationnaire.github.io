<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Côte — Prototype Point &amp; Click</title>
<style>
    :root {
        --bg-color: #050505;
        --ui-text: #ffffff;
        --ui-border: #333;
        --highlight-interact: rgba(255, 255, 0, 0.35); /* jaune objets */
        --highlight-nav: rgba(0, 200, 255, 0.25);     /* cyan navigation */
        --frame-w: 1280px;
        --frame-h: 720px; /* ratio 16:9 */
    }

    * { box-sizing: border-box; }

    body {
        background-color: var(--bg-color);
        color: var(--ui-text);
        margin: 0;
        padding: 0;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        cursor: default; /* curseur par défaut: flèche standard */
    }

    /* ---------- HEADER (titre du lieu) ---------- */
    #ui-header {
        width: var(--frame-w);
        max-width: 100vw;
        background-color: #000;
        border: 2px solid var(--ui-border);
        border-bottom: none;
        padding: 12px 0;
        text-align: center;
    }

    #location-name {
        margin: 0;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--ui-text);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    /* ---------- CADRE DE JEU (16:9) ---------- */
    #game-container {
        position: relative;
        width: var(--frame-w);
        height: var(--frame-h);
        max-width: 100vw;
        /* on garde le ratio si l'écran rétrécit */
        aspect-ratio: 16 / 9;
        max-height: calc(100vh - 80px);
        background-color: #000;
        border: 2px solid var(--ui-border);
        overflow: hidden;
    }

    #scene-image {
        width: 100%;
        height: 100%;
        object-fit: contain; /* aucune image rognée */
        display: block;
        user-select: none;
        -webkit-user-drag: none;
    }

    #hotspots-layer {
        position: absolute;
        inset: 0; /* couvre tout le conteneur */
        pointer-events: none; /* les zones gèrent elles-mêmes leurs clics */
    }

    /* ---------- ZONES CLIQUABLES ---------- */
    .hotspot {
        position: absolute;
        cursor: pointer;
        pointer-events: auto;
        border: 1px solid transparent;
        transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .hotspot.interact:hover {
        background-color: var(--highlight-interact);
        border-color: rgba(255, 255, 200, 0.9);
        box-shadow: inset 0 0 12px rgba(255, 255, 200, 0.4);
    }

    .hotspot.nav:hover {
        background-color: var(--highlight-nav);
        border-color: rgba(0, 220, 255, 0.7);
    }

    /* Étiquette au survol (optionnelle, utile en dev) */
    .hotspot[data-label]:hover::after {
        content: attr(data-label);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 3px 8px;
        font-size: 12px;
        white-space: nowrap;
        border: 1px solid #555;
        margin-bottom: 4px;
        pointer-events: none;
    }

    /* ---------- MODAL JOURNAL ---------- */
    #journal-modal {
        display: none; /* CACHÉ par défaut. JS le passera à 'flex' */
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 200;
        justify-content: center;
        align-items: center;
    }

    #journal-modal.open {
        display: flex;
    }

    .journal-window {
        width: 650px;
        max-width: 90vw;
        height: 720px;
        max-height: 85vh;
        background-color: #1a1a1a;
        border: 3px solid #444;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
    }

    .journal-header {
        padding: 15px;
        background-color: #222;
        border-bottom: 2px solid #444;
        text-align: center;
        position: relative;
    }

    .journal-header h2 {
        margin: 0;
        font-size: 1.2rem;
        letter-spacing: 2px;
    }

    .journal-header small { color: #888; }

    .journal-close {
        position: absolute;
        top: 10px;
        right: 12px;
        background: transparent;
        border: 1px solid #555;
        color: #ccc;
        width: 28px;
        height: 28px;
        line-height: 1;
        cursor: pointer;
        font-family: inherit;
    }
    .journal-close:hover { background: #444; color: #fff; }

    .journal-content {
        flex-grow: 1;
        padding: 25px;
        overflow-y: auto;
        color: #ddd;
        line-height: 1.6;
        background-color: #252525;
        display: flex;
        align-items: flex-start;
        justify-content: center;
    }

    .journal-content .text-page {
        width: 100%;
        white-space: pre-wrap;
    }

    .journal-content img {
        max-width: 100%;
        max-height: 100%;
        border: 1px solid #555;
        display: block;
    }

    .journal-footer {
        padding: 12px 15px;
        background-color: #222;
        border-top: 2px solid #444;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .journal-footer button {
        background: #333;
        color: #fff;
        border: 1px solid #666;
        padding: 8px 14px;
        cursor: pointer;
        font-family: inherit;
    }
    .journal-footer button:hover { background-color: #444; }
    .journal-footer button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    #page-indicator { color: #aaa; font-size: 13px; }
</style>
</head>
<body>

    <!-- TITRE DU LIEU -->
    <div id="ui-header">
        <h1 id="location-name">CHARGEMENT…</h1>
    </div>

    <!-- CADRE DE JEU -->
    <div id="game-container">
        <img id="scene-image" src="" alt="">
        <div id="hotspots-layer"></div>
    </div>

    <!-- MODAL JOURNAL -->
    <div id="journal-modal" role="dialog" aria-modal="true">
        <div class="journal-window">
            <div class="journal-header">
                <h2>JOURNAL DE CAROLE-LYNE</h2>
                <small>Archive de la Côte</small>
                <button class="journal-close" onclick="Journal.close()" title="Fermer (Échap)">×</button>
            </div>
            <div id="journal-content" class="journal-content"></div>
            <div class="journal-footer">
                <button id="journal-prev" onclick="Journal.prev()">&#8592; Précédent</button>
                <span id="page-indicator">— / —</span>
                <button id="journal-next" onclick="Journal.next()">Suivant &#8594;</button>
            </div>
        </div>
    </div>

<script>
/* =====================================================================
   CONFIGURATION DES LIEUX
   ---------------------------------------------------------------------
   Ajouter un lieu = ajouter une entrée dans LOCATIONS.
   Coordonnées en POURCENTAGES du conteneur (responsive, indépendantes
   de la taille réelle de l'image tant qu'elle est en 16:9).

   type:
     - 'nav'     : zone de navigation (bord d'image, transition entre lieux)
     - 'interact': objet cliquable (porte, escalier, journal, etc.)

   action:
     - { goto: 'id_du_lieu' }   : charge un autre lieu
     - { open: 'journal' }      : ouvre le journal modal
     (extensible : on pourra ajouter d'autres actions plus tard)
===================================================================== */

const LOCATIONS = {

    Maison01: {
        name: "Extérieur — Maison de John-Nathan",
        image: "./images/Maison01.jpg",
        zones: [
            // Porte d'entrée (objet)
            { type: 'interact', x: 40, y: 55, w: 20, h: 35,
              label: "Avancer", action: { goto: 'Maison02' } }
        ]
    },


    Maison02: {
        name: "Maison02",
        image: "./images/Maison02.jpg",
        zones: [
            // Bord bas : retour extérieur
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Sortir", action: { goto: 'Maison01' } },
            // Avancer
            { type: 'interact', x: 35, y: 35, w: 30, h: 45,
              label: "Avancer", action: { goto: 'Maison03' } }
        ]
    },


    Maison03: {
        name: "Maison03",
        image: "./images/Maison03.jpg",
        zones: [
            // Bord bas : retour extérieur
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Sortir", action: { goto: 'Maison02' } },
            // Avancer
            { type: 'interact', x: 35, y: 35, w: 30, h: 45,
              label: "Avancer", action: { goto: 'Maison04' } }
        ]
    },


    Maison04: {
        name: "Maison04",
        image: "./images/Maison04.jpg",
        zones: [
            // Bord bas : retour extérieur
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Sortir", action: { goto: 'Maison03' } },
            // Avancer
            { type: 'interact', x: 35, y: 35, w: 30, h: 45,
              label: "Avancer", action: { goto: 'Maison05' } }
        ]
    },


    Maison05: {
        name: "Maison05",
        image: "./images/Maison05.jpg",
        zones: [
            // Bord bas : retour extérieur
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Sortir", action: { goto: 'Maison04' } },
            // Avancer
            { type: 'interact', x: 35, y: 35, w: 30, h: 45,
              label: "Avancer", action: { goto: 'Maison06' } }
        ]
    },


    Maison06: {
        name: "Maison06",
        image: "./images/Maison06.jpg",
        zones: [
            // Bord bas : retour extérieur
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Sortir", action: { goto: 'Maison05' } },
            // Avancer
            { type: 'interact', x: 35, y: 35, w: 30, h: 45,
              label: "Avancer", action: { goto: 'Maison07' } }
        ]
    },


    Maison07: {
    name: "Chambre de Carole-Lyne",
    image: "./images/Maison07.jpg",
    zones: [
        // Retour vers le couloir (bord bas)
        { type: 'nav', x: 35, y: 90, w: 30, h: 10,
          label: "Sortir", action: { goto: 'Maison06' } },

        // Affiches sur le mur de gauche (bande verticale étroite)
        { type: 'interact', x: 2, y: 10, w: 22, h: 58,
          label: "Affiches", action: { goto: 'Maison08' } },

        // Bureau et écran à droite (zone plus carrée, bas-droit)
        { type: 'interact', x: 62, y: 38, w: 35, h: 55,
          label: "Bureau", action: { goto: 'Maison09' } }
    ]
},

    Maison08: {
        name: "Affiches",
        image: "./images/Maison08.jpg",
        zones: [
            // Plein écran : clic n'importe où = retour à la chambre
            { type: 'nav',x: 35, y: 90, w: 30, h: 10,
              label: "Retour", action: { goto: 'Maison07' } }
        ]
    },


    Maison08_carte: {
    name: "Carte de la Côte",
    image: "./images/Maison08_carte.jpg",
    zones: [
        { type: 'nav', x: 35, y: 90, w: 30, h: 10,
          label: "Retour", action: { goto: 'Maison08' } }
    ]
},

    Maison09: {
        name: "Bureau",
        image: "./images/Maison09.jpg",
        zones: [
            // Plein écran : clic n'importe où = retour à la chambre
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
            label: "Retour", action: { goto: 'Maison07' } }
        ]
    },


    ext_house: {
        name: "Extérieur — Maison de John-Nathan",
        image: "./images/maison_ext.jpg",
        zones: [
            // Porte d'entrée (objet)
            { type: 'interact', x: 40, y: 55, w: 20, h: 35,
              label: "Porte d'entrée", action: { goto: 'patio' } }
        ]
    },

    patio: {
        name: "Patio intérieur",
        image: "./images/patio.jpg",
        zones: [
            // Bord bas : retour extérieur
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Sortir", action: { goto: 'ext_house' } },
            // Escalier au centre vers l'étage (objet)
            { type: 'interact', x: 35, y: 35, w: 30, h: 45,
              label: "Escalier", action: { goto: 'corridor_2nd' } }
        ]
    },

    corridor_2nd: {
        name: "Couloir — Deuxième étage",
        image: "./images/couloir.jpg",
        zones: [
            // Bord bas : redescendre au patio
            { type: 'nav', x: 35, y: 90, w: 30, h: 10,
              label: "Redescendre", action: { goto: 'patio' } },
            // Première porte à gauche : chambre de Carole-Lyne (objet)
            { type: 'interact', x: 8, y: 30, w: 18, h: 50,
              label: "Chambre de Carole-Lyne", action: { goto: 'carole_room' } }
        ]
    },

    carole_room: {
        name: "Chambre de Carole-Lyne",
        image: "./images/chambre_carole.jpg",
        zones: [
            // Bord droit : retour au couloir
            { type: 'nav', x: 90, y: 30, w: 10, h: 50,
              label: "Sortir", action: { goto: 'corridor_2nd' } },
            // Journal sur le bureau (objet) — ajustez ces % selon votre image
            { type: 'interact', x: 65, y: 50, w: 20, h: 18,
              label: "Journal intime", action: { open: 'journal' } }
        ]
    }
};

/* =====================================================================
   DONNÉES DU JOURNAL
===================================================================== */
const JOURNAL_PAGES = [
    {
        type: 'text',
        content: "Journée 4206.9\n\nLes bruits de la côte sont différents ce soir. Le vent porte l'odeur des Roses Sagittales, mais il y a autre chose — une odeur de métal chaud."
    },
    {
        type: 'image',
        src: "./images/notes_carole_01.jpg",
        caption: "Croquis — la silhouette dans la dune"
    },
    {
        type: 'text',
        content: "Journée 4207.3\n\nJohn-Nathan dit que rien ne meurt vraiment sur la Terre. Que tout est réécrit. Je crois qu'il a peur, mais il ne le dit pas."
    }
];

/* =====================================================================
   MOTEUR DE JEU — NAVIGATION
===================================================================== */
const Game = {
    currentSceneId: null,

    load(sceneId) {
        const scene = LOCATIONS[sceneId];
        if (!scene) {
            console.error(`[Game] Lieu inconnu : "${sceneId}"`);
            return;
        }
        this.currentSceneId = sceneId;

        // Titre
        document.getElementById('location-name').textContent = scene.name;

        // Image (avec fallback si introuvable)
        const img = document.getElementById('scene-image');
        img.onerror = () => {
            img.onerror = null;
            img.alt = `[Image manquante : ${scene.image}]`;
            img.removeAttribute('src');
        };
        img.alt = scene.name;
        img.src = scene.image || '';

        // Zones cliquables
        this.renderZones(scene.zones || []);
    },

    renderZones(zones) {
        const layer = document.getElementById('hotspots-layer');
        layer.innerHTML = '';

        zones.forEach(z => {
            const el = document.createElement('div');
            el.className = 'hotspot ' + (z.type === 'nav' ? 'nav' : 'interact');
            el.style.left   = z.x + '%';
            el.style.top    = z.y + '%';
            el.style.width  = z.w + '%';
            el.style.height = z.h + '%';
            if (z.label) el.dataset.label = z.label;

            el.addEventListener('click', (e) => {
                e.stopPropagation();
                this.handleAction(z.action);
            });

            layer.appendChild(el);
        });
    },

    handleAction(action) {
        if (!action) return;
        if (action.goto) {
            this.load(action.goto);
        } else if (action.open === 'journal') {
            Journal.open();
        }
        // Extensible : autres actions ici (pickup, dialogue, etc.)
    }
};

/* =====================================================================
   MOTEUR DU JOURNAL
===================================================================== */
const Journal = {
    index: 0,

    open() {
        document.getElementById('journal-modal').classList.add('open');
        this.render();
    },

    close() {
        document.getElementById('journal-modal').classList.remove('open');
    },

    next() {
        if (this.index < JOURNAL_PAGES.length - 1) {
            this.index++;
            this.render();
        }
    },

    prev() {
        if (this.index > 0) {
            this.index--;
            this.render();
        }
    },

    render() {
        const container = document.getElementById('journal-content');
        const indicator = document.getElementById('page-indicator');
        const btnPrev = document.getElementById('journal-prev');
        const btnNext = document.getElementById('journal-next');

        container.innerHTML = '';
        const page = JOURNAL_PAGES[this.index];
        if (!page) return;

        if (page.type === 'text') {
            const div = document.createElement('div');
            div.className = 'text-page';
            div.textContent = page.content;
            container.appendChild(div);
        } else if (page.type === 'image') {
            const wrap = document.createElement('div');
            const img = document.createElement('img');
            img.src = page.src;
            img.alt = page.caption || 'Page illustrée';
            img.onerror = () => {
                img.style.display = 'none';
                const fb = document.createElement('p');
                fb.style.color = '#888';
                fb.textContent = `[Image manquante : ${page.src}]`;
                wrap.appendChild(fb);
            };
            wrap.appendChild(img);
            if (page.caption) {
                const cap = document.createElement('p');
                cap.style.cssText = 'color:#888;font-size:12px;text-align:center;margin-top:8px;';
                cap.textContent = page.caption;
                wrap.appendChild(cap);
            }
            container.appendChild(wrap);
        }

        indicator.textContent = `${this.index + 1} / ${JOURNAL_PAGES.length}`;
        btnPrev.disabled = (this.index === 0);
        btnNext.disabled = (this.index === JOURNAL_PAGES.length - 1);
    }
};

/* =====================================================================
   RACCOURCIS CLAVIER
===================================================================== */
document.addEventListener('keydown', (e) => {
    const modalOpen = document.getElementById('journal-modal').classList.contains('open');
    if (modalOpen) {
        if (e.key === 'Escape') Journal.close();
        else if (e.key === 'ArrowRight') Journal.next();
        else if (e.key === 'ArrowLeft')  Journal.prev();
    }
});

// Fermer le journal en cliquant sur le fond noir (hors fenêtre)
document.getElementById('journal-modal').addEventListener('click', (e) => {
    if (e.target.id === 'journal-modal') Journal.close();
});

/* =====================================================================
   DÉMARRAGE
===================================================================== */
window.addEventListener('DOMContentLoaded', () => {
    Game.load('Maison01');
});
</script>
</body>
</html>
